server {
    server_name chatbridge.foramerica.dev;

    # ── API (Express backend) ─────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
    }

    # ── App iframes (static files) ───────────────────────────────────
    location /apps/chess/ {
        alias /root/chatbridge/apps/chess/;
        try_files $uri $uri/ /apps/chess/index.html;
    }

    location /apps/wordle/ {
        alias /root/chatbridge/apps/wordle/;
        try_files $uri $uri/ /apps/wordle/index.html;
    }

    # ── Frontend (Vite build output) ─────────────────────────────────
    location / {
        root /root/chatbridge/dist;
        try_files $uri $uri/ /index.html;
    }

    listen 80;
}
